name: CI-API

on: 
  push:
    paths: 
      - 'api/**'
  pull_request:
    branches:
      - main

jobs: 
  coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci
        
      - name: Run Tests
        uses: ArtiomTr/jest-coverage-report-action@v2
        with: 
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ./api
          threshold: 10
          
      - name: Build project
        run: npm run build
